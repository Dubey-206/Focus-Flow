<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220" width="100%" height="100%">
  <defs>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>
  
  <!-- Floating background shapes -->
  <circle cx="150" cy="110" r="80" fill="url(#glow-grad)" />
  <circle cx="60" cy="60" r="12" fill="#818cf8" opacity="0.15" />
  <circle cx="240" cy="150" r="8" fill="#c084fc" opacity="0.2" />
  
  <!-- Stylized Clipboard/Document -->
  <rect x="95" y="45" width="110" height="130" rx="12" fill="#1e1b4b" fill-opacity="0.6" stroke="#4f46e5" stroke-width="2" stroke-dasharray="2 2" />
  <rect x="105" y="55" width="90" height="110" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
  
  <!-- Clipboard Clip -->
  <rect x="135" y="38" width="30" height="12" rx="4" fill="url(#accent-grad)" />
  
  <!-- Mock Checklist lines -->
  <!-- Line 1 -->
  <rect x="135" y="80" width="45" height="6" rx="3" fill="#64748b" opacity="0.5" />
  <circle cx="120" cy="83" r="5" fill="#64748b" opacity="0.5" />
  
  <!-- Line 2 -->
  <rect x="135" y="105" width="50" height="6" rx="3" fill="#64748b" opacity="0.5" />
  <circle cx="120" cy="108" r="5" fill="#64748b" opacity="0.5" />
  
  <!-- Line 3 (Checked/Accented) -->
  <rect x="135" y="130" width="35" height="6" rx="3" fill="url(#accent-grad)" opacity="0.8" />
  <circle cx="120" cy="133" r="5" fill="url(#accent-grad)" />
  <path d="M117 133 L119 135 L123 131" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Sparkles -->
  <path d="M220 50 L223 55 L228 56 L223 58 L220 63 L217 58 L212 56 L217 55 Z" fill="#fbbf24" opacity="0.8" />
  <path d="M70 150 L72 153 L75 154 L72 155 L70 159 L68 155 L65 154 L68 153 Z" fill="#38bdf8" opacity="0.6" />
</svg>
