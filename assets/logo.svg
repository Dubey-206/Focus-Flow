<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Gradient for Logo Mark -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <!-- Shadow Filter -->
    <filter id="logo-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#6366f1" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Background Shape / Glow -->
  <rect x="15" y="15" width="70" height="70" rx="20" fill="url(#logo-grad)" opacity="0.1" />
  <!-- Border Line -->
  <rect x="20" y="20" width="60" height="60" rx="16" fill="none" stroke="url(#logo-grad)" stroke-width="4" filter="url(#logo-shadow)" />
  <!-- Checkmark -->
  <path d="M38 50 L47 59 L64 38" fill="none" stroke="url(#logo-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#logo-shadow)" />
</svg>
